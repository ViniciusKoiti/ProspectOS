schema_version = 1
generated_at = "2026-03-22"
default_remote = "origin"
default_base_branch = "feature/semana-2-demo-ready"

[standards]
tdd_required = true
commit_convention = "conventional-commits"
max_class_lines = 100

[workflow]
step_1 = "checkout workspace branch and validate clean status"
step_2 = "write or update failing test first (red)"
step_3 = "implement smallest change to pass tests (green)"
step_4 = "refactor with tests still green"
step_5 = "commit and push only workspace-owned scope"

[commands]
preflight = "git status --short"
backend_full_test = "$env:GRADLE_USER_HOME='D:/Cursos/prospectos/.gradle-user-home'; ./gradlew test"
frontend_test = "pnpm run test"
push = "git push -u origin <branch>"

[[agent]]
name = "ws-cnpj-ws"
role = "backend"
workspace = "D:/Cursos/prospectos/output/workspaces/integracao-cnpj-ws"
branch = "feature/integracao-cnpj-ws"
focus = "cnpj ws integration and validation flow"
commit_scope = "discovery-cnpj-ws"
tests = [
  "./gradlew test --tests 'dev.prospectos.infrastructure.service.discovery.CNPJLeadDiscoverySourceTest'"
]

