plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.9'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
    id 'org.sonarqube' version '4.4.1.3373'
    id 'com.github.spotbugs' version '5.0.14'
    id 'pmd'
}

group = 'dev.prospectos'
version = '0.0.1-SNAPSHOT'
description = 'prospectos'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

ext {
    set('springModulithVersion', "1.4.4")
    set('springAiVersion', "1.1.2")
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.modulith:spring-modulith-starter-core'
    implementation 'org.springframework.ai:spring-ai-starter-model-openai'
    implementation 'org.springframework.ai:spring-ai-starter-model-anthropic'
    implementation 'org.springframework.ai:spring-ai-starter-mcp-server'
    implementation 'org.springframework.ai:spring-ai-starter-vector-store-pgvector'
    implementation 'jakarta.annotation:jakarta.annotation-api:2.1.1'
    runtimeOnly 'org.postgresql:postgresql'
    runtimeOnly 'io.micrometer:micrometer-registry-prometheus'
    implementation "io.github.cdimascio:dotenv-java:3.0.0"
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.0'
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.boot:spring-boot-testcontainers'
    testImplementation 'org.springframework.modulith:spring-modulith-starter-test'
    testImplementation 'org.mockito:mockito-core'
    testImplementation 'org.testcontainers:junit-jupiter'
    testImplementation 'org.testcontainers:postgresql'
    testImplementation 'com.h2database:h2'
    testImplementation 'org.junit.platform:junit-platform-suite-api'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

dependencyManagement {
    imports {
        mavenBom "org.springframework.modulith:spring-modulith-bom:${springModulithVersion}"
        mavenBom "org.springframework.ai:spring-ai-bom:${springAiVersion}"
    }
}

tasks.named('bootBuildImage') {
    imageName = "prospectos:${project.version}"
    environment = [
        'BP_JVM_VERSION': '21'
    ]
}

tasks.named('test') {
    useJUnitPlatform()
    finalizedBy tasks.named('jacocoTestReport')
}

tasks.register('integrationTestPg', Test) {
    description = 'Runs integration tests that depend on test-pg profile and Testcontainers.'
    group = 'verification'

    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform()
    shouldRunAfter tasks.named('test')

    filter {
        includeTestsMatching 'dev.prospectos.integration.*IntegrationTest'
    }
}

jacocoTestReport {
    dependsOn tasks.named('test')
    reports {
        xml.required = true
        html.required = true
        csv.required = true
    }

    // Exclude generated/configuration classes from coverage
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                '**/config/**/*Configuration*',
                '**/ProspectosApplication*',
                '**/dto/**/*DTO*',
                '**/dto/**/*Request*',
                '**/dto/**/*Response*',
                '**/ai/example/**'
            ])
        }))
    }

    finalizedBy 'jacocoTestCoverageVerification'
}

jacocoTestCoverageVerification {
    dependsOn 'jacocoTestReport'

    violationRules {
        rule {
            limit {
                counter = 'INSTRUCTION'
                value = 'COVEREDRATIO'
                minimum = 0.60 // 60% minimum instruction coverage
            }
        }

        rule {
            limit {
                counter = 'BRANCH'
                value = 'COVEREDRATIO'
                minimum = 0.50 // 50% minimum branch coverage
            }
        }

        rule {
            element = 'CLASS'
            excludes = [
                '*.*Configuration*',
                '*.*Application*',
                '*.dto.*',
            ]
            limit {
                counter = 'INSTRUCTION'
                value = 'COVEREDRATIO'
                minimum = 0.70 // 70% for business logic classes
            }
        }
    }
}

// ===== SONARQUBE CONFIGURATION =====
sonarqube {
    properties {
        property 'sonar.projectKey', 'prospectos'
        property 'sonar.projectName', 'ProspectOS'
        property 'sonar.projectVersion', project.version
        property 'sonar.sourceEncoding', 'UTF-8'

        // Coverage reports
        property 'sonar.coverage.jacoco.xmlReportPaths', 'build/reports/jacoco/test/jacocoTestReport.xml'

        // Code analysis
        property 'sonar.java.source', '21'
        property 'sonar.java.target', '21'

        // Quality gates
        property 'sonar.qualitygate.wait', true

        // Exclude patterns
        property 'sonar.exclusions', [
            '**/config/**/*Configuration*',
            '**/ProspectosApplication.java',
            '**/dto/**/*',
            '**/generated/**/*'
        ].join(',')

        // Test exclusions
        property 'sonar.test.exclusions', [
            '**/test/**/*',
            '**/*Test*',
            '**/*Mock*'
        ].join(',')

        // Additional analysis
        property 'sonar.java.spotbugs.reportPaths', 'build/reports/spotbugs/main.xml'
        property 'sonar.java.pmd.reportPaths', 'build/reports/pmd/main.xml'
    }
}

// ===== SPOTBUGS CONFIGURATION =====
spotbugs {
    ignoreFailures = true
    effort = 'default'
    reportLevel = 'medium'
    excludeFilter = file('config/spotbugs/spotbugs-exclude.xml')
}

spotbugsMain {
    reports {
        xml {
            required = true
            outputLocation = file('build/reports/spotbugs/main.xml')
        }
        html {
            required = true
            outputLocation = file('build/reports/spotbugs/main.html')
        }
    }
}

spotbugsTest {
    reports {
        xml {
            required = true
            outputLocation = file('build/reports/spotbugs/test.xml')
        }
        html {
            required = true
            outputLocation = file('build/reports/spotbugs/test.html')
        }
    }
}

// ===== PMD CONFIGURATION =====
pmd {
    consoleOutput = true
    toolVersion = '6.55.0'
    ruleSetFiles = files('config/pmd/pmd-rules.xml')
    ignoreFailures = true
}

pmdMain {
    reports {
        xml {
            required = true
            outputLocation = file('build/reports/pmd/main.xml')
        }
        html {
            required = true
            outputLocation = file('build/reports/pmd/main.html')
        }
    }
}

pmdTest {
    reports {
        xml {
            required = true
            outputLocation = file('build/reports/pmd/test.xml')
        }
        html {
            required = true
            outputLocation = file('build/reports/pmd/test.html')
        }
    }
}

// ===== INTEGRATED QUALITY CHECK TASK =====
tasks.register('qualityCheck') {
    description = 'Runs all quality checks: tests, coverage, spotbugs, pmd, and sonar analysis'
    group = 'verification'

    dependsOn 'test', 'jacocoTestReport', 'jacocoTestCoverageVerification', 'spotbugsMain', 'pmdMain'

    doLast {
        println """
        ✅ Quality Check Complete!

        📊 Reports Generated:
        - Coverage: build/reports/jacoco/test/html/index.html
        - SpotBugs: build/reports/spotbugs/main.html
        - PMD: build/reports/pmd/main.html

        🔍 Run SonarQube analysis with:
        ./gradlew sonarqube
        """
    }
}

