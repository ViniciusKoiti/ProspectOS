# Spring Configuration
spring.application.name=prospectos

# AI Configuration - our services disabled, AutoConfigurations excluded
prospectos.ai.enabled=false

# Disable Spring AI VectorStore types to prevent unwanted AutoConfiguration activation
spring.ai.vectorstore.type=none

# Lead search configuration
prospectos.leads.allowed-sources=in-memory,vector-company,cnpj-ws,open-cnpj
prospectos.leads.default-sources=in-memory
prospectos.leads.default-icp-id=1
# Discovery sources controlled by allowed-sources (vector-company enabled, llm-discovery disabled)

# Scoring configuration
prospectos.scoring.enabled=true
prospectos.scoring.mock.enabled=true

# Database configuration - use in-memory H2
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Scraper Configuration
scraper.ai.enabled=false

# Logging
logging.level.dev.prospectos=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
# Exclude problematic Spring AI AutoConfigurations due to API key validation bug #4494
# Reference: https://github.com/spring-projects/spring-ai/issues/4494
# Also exclude PgVector since we use InMemoryVectorIndex for tests
spring.autoconfigure.exclude=\
  org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
  org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration,\
  org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
