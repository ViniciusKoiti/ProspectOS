# Production profile configuration

# Database - PostgreSQL with optimizations
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Connection pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# AI Configuration - Real providers only
spring.ai.openai.enabled=${OPENAI_ENABLED:false}
spring.ai.anthropic.enabled=${ANTHROPIC_ENABLED:false}
mock.ai.responses.enabled=false

# Vector store - PgVector for production
spring.ai.vectorstore.pgvector.enabled=${PGVECTOR_ENABLED:true}
spring.ai.vectorstore.pgvector.initialize-schema=${PGVECTOR_INITIALIZE_SCHEMA:false}
spring.ai.vectorstore.pgvector.table-name=${prospectos.vectorization.pgvector.table-name}
spring.ai.vectorstore.pgvector.dimensions=${prospectos.vectorization.embedding-dimension}
spring.ai.vectorstore.pgvector.distance-type=COSINE_DISTANCE

prospectos.vectorization.backend=${VECTOR_BACKEND:pgvector}
prospectos.vectorization.pgvector.initialize-schema=false

# Lead discovery - Production sources only
prospectos.leads.allowed-sources=in-memory,vector-company
prospectos.leads.default-sources=in-memory
prospectos.leads.default-icp-id=1
# Discovery sources controlled by allowed-sources (vector-company enabled, llm-discovery disabled)

# External integrations
# CNPJ integration controlled by 'cnpj-ws' in allowed-sources (disabled in production)

# Scoring configuration
prospectos.scoring.enabled=${SCORING_ENABLED:false}
prospectos.scoring.cron=0 0 * * * *
prospectos.scoring.icp-id=

# Scraper Configuration
scraper.ai.enabled=${SCRAPER_AI_ENABLED:true}

# Legacy Scraper Service (fallback)
scraper.service.url=${SCRAPER_SERVICE_URL:http://localhost:3000}
scraper.service.timeout=30s
scraper.service.max-retries=3

# Production logging
logging.level.dev.prospectos=INFO
logging.level.root=WARN

# Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db
management.metrics.export.prometheus.enabled=true
