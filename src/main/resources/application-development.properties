# Development profile configuration
# Uses the shared PostgreSQL datasource from application.properties.

spring.jpa.hibernate.ddl-auto=update

# AI Configuration - Real providers with fallback
spring.ai.openai.api-key=${OPENAI_API_KEY:mock-key-for-testing}
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:mock-key-for-testing}
spring.ai.openai.enabled=${OPENAI_ENABLED:false}
spring.ai.anthropic.enabled=${ANTHROPIC_ENABLED:false}
mock.ai.responses.enabled=${MOCK_AI_ENABLED:true}

# Vector configuration
spring.ai.vectorstore.pgvector.enabled=false
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
# Vector discovery is controlled by 'vector-company' presence in allowed-sources

# Lead discovery - All sources enabled for development
prospectos.leads.allowed-sources=in-memory,scraper,llm-discovery,vector-company,cnpj-ws,open-cnpj,amazon-location,google-places
prospectos.leads.default-sources=in-memory
prospectos.leads.default-icp-id=1
# LLM discovery is controlled by 'llm-discovery' presence in allowed-sources

# External integrations
# CNPJ integration is controlled by 'cnpj-ws' presence in allowed-sources

# Scraper Configuration
scraper.ai.enabled=true

# Legacy Scraper Service (fallback)
scraper.service.url=http://localhost:3000
scraper.service.timeout=30s
scraper.service.max-retries=3

# Development logging
logging.level.dev.prospectos=DEBUG
logging.level.dev.prospectos.ai=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.root=INFO

