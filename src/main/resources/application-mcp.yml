server:
  port: 8082

spring:
  ai:
    openai:
      api-key: mock-key-for-testing
      enabled: false
      chat:
        enabled: false
    anthropic:
      api-key: mock-key-for-testing
      enabled: false
    mcp:
      server:
        enabled: true
        name: prospectos-mcp-server
        version: 0.0.1-SNAPSHOT
        type: SYNC
        protocol: STREAMABLE
        stdio: true
        instructions: >
          ProspectOS MCP server exposes lead-search metrics and provider routing
          context for autonomous optimization workflows.
        annotation-scanner:
          enabled: true
        streamable-http:
          mcp-endpoint: /mcp
        security:
          enabled: true
          api-key-header: X-MCP-API-KEY
          allowed-api-keys:
            - mcp-dev-key-2024
            - mcp-prod-key-2024
          rate-limit:
            requests-per-minute: 100
            burst-capacity: 20
            window-size: PT1M
            block-duration: PT1H
          audit:
            enabled: true
            log-successful-requests: true
            log-failed-requests: true

logging:
  level:
    org.springframework.ai.mcp: DEBUG
    dev.prospectos.infrastructure.mcp: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      group:
        mcp:
          include: mcpServer

prospectos:
  ai:
    active-providers: ${PROSPECTOS_AI_ACTIVE_PROVIDERS:groq}


