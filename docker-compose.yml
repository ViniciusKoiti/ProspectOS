services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: prospectos-postgres
    environment:
      POSTGRES_DB: prospectos
      POSTGRES_USER: prospectos
      POSTGRES_PASSWORD: prospectos123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prospectos -d prospectos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
