name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Start PostgreSQL with pgvector
        run: |
          docker run -d \
            --name postgres-test \
            -e POSTGRES_DB=prospectos \
            -e POSTGRES_USER=prospectos \
            -e POSTGRES_PASSWORD=prospectos \
            -p 5432:5432 \
            pgvector/pgvector:pg16
          
          # Wait for PostgreSQL to be ready
          docker exec postgres-test sh -c 'until pg_isready -U prospectos; do sleep 1; done'
          
          # Verify pgvector extension is available
          docker exec postgres-test psql -U prospectos -d prospectos -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run tests
        run: ./gradlew --no-daemon clean test

      - name: Stop PostgreSQL container
        if: always()
        run: |
          docker stop postgres-test || true
          docker rm postgres-test || true

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html
          if-no-files-found: ignore
